version: 2
updates:
  # mppx is kept OUT of the group below so its bump PRs stay loud: it is an
  # exact-pinned peer dependency (pre-1.0 churn), so every bump is a conscious
  # decision — pin devDependency AND peerDependency together, and check the
  # mppx-latest CI job for early breakage signals.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns: ["*"]
        exclude-patterns: ["mppx"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
